<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair — dasom's world</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#1a1018; --bg2:#241a22; --bg3:#2e2030;
  --pink:#e5a9bf; --pink-light:#fdd6dd; --pink-dim:#a06080; --pink-dark:#6b3a52;
  --text:#fdd6dd; --text-dim:#c9a0b4; --text-muted:#7a5568;
  --border:rgba(229,169,191,0.18); --border-strong:rgba(229,169,191,0.4);
}
html,body { height:100%; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-weight:400; overflow:hidden; height:100vh; }

nav { position:fixed; top:0; left:0; right:0; z-index:200; background:rgba(26,16,24,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; height:52px; }
.nav-back { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); text-decoration:none; margin-right:1.5rem; transition:color 0.2s; }
.nav-back:hover { color:var(--pink); }
.nav-title { font-family:'IM Fell English',serif; font-style:italic; font-size:18px; color:var(--text); letter-spacing:0.06em; flex:1; }
.nav-links { display:flex; gap:0; list-style:none; }
.nav-links li a { display:block; padding:0 1rem; height:52px; line-height:52px; font-size:10px; letter-spacing:0.16em; color:var(--text-muted); text-decoration:none; transition:color 0.2s; text-transform:uppercase; }
.nav-links li a:hover { color:var(--text-dim); }
.nav-links li.active a { color:var(--pink); border-bottom:2px solid var(--pink); }

/* MAIN LAYOUT */
.main-wrap { display:flex; height:100vh; padding-top:52px; }

/* GRAPH AREA */
.graph-area { flex:1; position:relative; overflow:hidden; }
canvas#graph-canvas { position:absolute; inset:0; width:100%; height:100%; }

/* DETAIL PANEL */
.detail-panel {
  width:380px; flex-shrink:0;
  background:var(--bg2); border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.23,1,0.32,1);
  overflow:hidden;
}
.detail-panel.open { transform:translateX(0); }

.panel-header { padding:1.5rem; border-bottom:1px solid var(--border); }
.panel-close { float:right; background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:14px; transition:color 0.2s; }
.panel-close:hover { color:var(--pink); }
.panel-pair-names {
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:22px; color:var(--text); letter-spacing:0.04em;
  margin-bottom:6px; margin-top:4px;
}
.panel-pair-names span { color:var(--pink); }
.panel-rel-tag {
  display:inline-block; padding:3px 12px;
  border:1px solid var(--pink-dark); font-size:10px;
  letter-spacing:0.15em; text-transform:uppercase;
  color:var(--pink-dim); font-family:'Cormorant Garamond',serif; font-style:italic;
}

.panel-body { flex:1; overflow-y:auto; padding:1.5rem; }
.panel-body::-webkit-scrollbar { width:3px; }
.panel-body::-webkit-scrollbar-thumb { background:var(--pink-dark); }

.panel-imgs { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1.5rem; }
.panel-img-wrap { aspect-ratio:3/4; background:var(--bg3); border:1px solid var(--border); overflow:hidden; position:relative; }
.panel-img-wrap img { width:100%; height:100%; object-fit:cover; object-position:top; }
.panel-img-name { position:absolute; bottom:0; left:0; right:0; padding:8px; background:linear-gradient(to top,rgba(26,16,24,0.9),transparent); font-size:11px; color:var(--text-dim); text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic; letter-spacing:0.08em; }
.panel-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'IM Fell English',serif; font-style:italic; font-size:42px; color:rgba(229,169,191,0.08); }

.panel-section { margin-bottom:1.5rem; }
.panel-section-title { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--pink-dim); margin-bottom:0.75rem; font-family:'Cormorant Garamond',serif; font-style:italic; display:flex; align-items:center; gap:8px; }
.panel-section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.panel-desc { font-size:12px; color:var(--text-dim); line-height:1.9; letter-spacing:0.03em; }
.panel-keywords { display:flex; flex-wrap:wrap; gap:6px; }
.panel-keyword { padding:3px 10px; background:rgba(160,96,128,0.1); border:1px solid var(--border); font-size:10px; color:var(--text-muted); letter-spacing:0.08em; font-family:'Cormorant Garamond',serif; font-style:italic; }

/* LEGEND */
.graph-legend { position:absolute; bottom:1.5rem; left:1.5rem; display:flex; flex-direction:column; gap:6px; z-index:10; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:10px; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* HINT */
.graph-hint { position:absolute; top:1.5rem; left:50%; transform:translateX(-50%); font-size:10px; color:var(--text-muted); letter-spacing:0.15em; text-transform:uppercase; pointer-events:none; }

/* BGM */
#bgm-player { position:fixed; bottom:1.5rem; right:1.5rem; z-index:999; background:rgba(26,16,24,0.96); border:1px solid var(--border); backdrop-filter:blur(12px); display:flex; align-items:center; gap:10px; padding:10px 14px; min-width:220px; max-width:300px; transition:all 0.3s; }
#bgm-player.collapsed { min-width:0; max-width:none; width:44px; height:44px; padding:0; justify-content:center; }
#bgm-player.collapsed #bgm-info,#bgm-player.collapsed #bgm-vol-wrap,#bgm-player.collapsed #bgm-toggle-collapse,#bgm-player.collapsed #bgm-play-btn { display:none; }
#bgm-play-btn { width:28px; height:28px; flex-shrink:0; background:transparent; border:1px solid var(--pink-dim); color:var(--pink); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; }
#bgm-info { flex:1; min-width:0; }
#bgm-title { font-size:10px; color:var(--text-dim); letter-spacing:0.06em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#bgm-artist { font-size:9px; color:var(--text-muted); margin-top:2px; }
#bgm-vol-wrap { display:flex; align-items:center; }
#bgm-vol { width:55px; accent-color:var(--pink); cursor:pointer; }
#bgm-toggle-collapse { background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:11px; padding:2px 4px; flex-shrink:0; }
#bgm-expand-btn { display:none; background:transparent; border:none; color:var(--pink); cursor:pointer; font-size:14px; width:100%; height:100%; align-items:center; justify-content:center; }
#bgm-player.collapsed #bgm-expand-btn { display:flex; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">← back</a>
  <div class="nav-title">Pair — Relationship Map</div>
  <ul class="nav-links">
    <li><a href="oc.html">OC</a></li>
    <li class="active"><a href="pair.html">Pair</a></li>
  </ul>
</nav>

<div class="main-wrap">
  <div class="graph-area">
    <canvas id="graph-canvas"></canvas>
    <div class="graph-hint">노드를 클릭하면 상세 정보가 표시됩니다</div>
    <div class="graph-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#e5a9bf;"></div>주인공</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c0392b;opacity:0.7;"></div>키사라기</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9a7d4a;opacity:0.8;"></div>서브</div>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="panel-header">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div style="font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);">Relationship</div>
      <div class="panel-pair-names" id="panel-names">— <span>&</span> —</div>
      <div class="panel-rel-tag" id="panel-rel-tag">—</div>
    </div>
    <div class="panel-body">
      <div class="panel-imgs" id="panel-imgs"></div>
      <div class="panel-section">
        <div class="panel-section-title">About</div>
        <div class="panel-desc" id="panel-desc">—</div>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">Keywords</div>
        <div class="panel-keywords" id="panel-keywords"></div>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">Story</div>
        <div class="panel-desc" id="panel-story" style="white-space:pre-wrap;">—</div>
      </div>
    </div>
  </div>
</div>

<div id="bgm-player">
  <button id="bgm-play-btn">▶</button>
  <div id="bgm-info"><div id="bgm-title">BGM</div><div id="bgm-artist"></div></div>
  <div id="bgm-vol-wrap"><input type="range" id="bgm-vol" min="0" max="100" value="70"></div>
  <button id="bgm-toggle-collapse">✕</button>
  <button id="bgm-expand-btn">♪</button>
</div>
<div id="yt-container" style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;"></div>

<script>
// DEFAULT PAIRS DATA
var defaultPairs = [
  {
    id:'yundan-negai',
    chars:['윤단','願'],
    charImgs:['',''],
    relation:'Silent Bond',
    desc:'말하지 않아도 곁에 있는 것. 건조한 말투와 조용한 존재감 사이의 관계.',
    keywords:['침묵','동행','신뢰','말없는 이해'],
    story:'',
    color:'#e5a9bf'
  },
  {
    id:'uru-toya',
    chars:['遠藤 潤','遠藤 斗哉'],
    charImgs:['',''],
    relation:'Antagonist × Protagonist',
    desc:'키사라기 고교의 생도회장과 전학생. 서로가 서로의 비밀을 알고 있다.',
    keywords:['대립','비밀','학교','숨겨진 연결'],
    story:'',
    color:'#c0392b'
  },
  {
    id:'iori-toya',
    chars:['遠藤 伊織','遠藤 斗哉'],
    charImgs:['',''],
    relation:'Founder × Descendant',
    desc:'창립자와 그 후계자. 봉인된 진실을 사이에 둔 두 사람.',
    keywords:['혈연','봉인','과거','운명'],
    story:'',
    color:'#9a7d4a'
  }
];

function getPairs(){ try{return JSON.parse(localStorage.getItem('oc_pairs'))||defaultPairs;}catch(e){return defaultPairs;} }

// GRAPH
var canvas = document.getElementById('graph-canvas');
var ctx = canvas.getContext('2d');
var nodes = [];
var edges = [];
var hoveredNode = null;
var animFrame = null;

function buildGraph(){
  var pairs = getPairs();
  nodes = [];
  edges = [];
  var charMap = {};

  pairs.forEach(function(p){
    p.chars.forEach(function(name, ci){
      if(!charMap[name]){
        var existing = nodes.find(function(n){return n.name===name;});
        if(!existing){
          charMap[name] = {
            id: name,
            name: name,
            img: p.charImgs[ci]||'',
            color: p.color,
            x: Math.random()*0.6+0.2,
            y: Math.random()*0.6+0.2,
            vx:0, vy:0, r:28
          };
          nodes.push(charMap[name]);
        }
      }
    });
    edges.push({ a: p.chars[0], b: p.chars[1], relation: p.relation, color: p.color, pairId: p.id });
  });

  // spread initial positions
  nodes.forEach(function(n, i){
    var angle = (i / nodes.length) * Math.PI * 2;
    n.x = 0.5 + Math.cos(angle) * 0.3;
    n.y = 0.5 + Math.sin(angle) * 0.28;
  });
}

function resizeCanvas(){
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}

function simulate(){
  var W = canvas.width, H = canvas.height;
  // repulsion
  nodes.forEach(function(a){
    nodes.forEach(function(b){
      if(a===b) return;
      var dx = a.x*W - b.x*W, dy = a.y*H - b.y*H;
      var dist = Math.sqrt(dx*dx+dy*dy)||1;
      var force = 8000/(dist*dist);
      a.vx += dx/dist*force/W;
      a.vy += dy/dist*force/H;
    });
  });
  // attraction along edges
  edges.forEach(function(e){
    var na = nodes.find(function(n){return n.id===e.a;}), nb = nodes.find(function(n){return n.id===e.b;});
    if(!na||!nb) return;
    var dx=(nb.x-na.x)*W, dy=(nb.y-na.y)*H, dist=Math.sqrt(dx*dx+dy*dy)||1;
    var target=160, force=(dist-target)*0.0012;
    na.vx += dx/dist*force; na.vy += dy/dist*force;
    nb.vx -= dx/dist*force; nb.vy -= dy/dist*force;
  });
  // center gravity
  nodes.forEach(function(n){
    n.vx += (0.5-n.x)*0.008;
    n.vy += (0.5-n.y)*0.008;
    n.vx *= 0.85; n.vy *= 0.85;
    n.x += n.vx; n.y += n.vy;
    n.x = Math.max(0.08,Math.min(0.92,n.x));
    n.y = Math.max(0.08,Math.min(0.92,n.y));
  });
}

function draw(){
  var W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // edges
  edges.forEach(function(e){
    var na=nodes.find(function(n){return n.id===e.a;}), nb=nodes.find(function(n){return n.id===e.b;});
    if(!na||!nb) return;
    var ax=na.x*W, ay=na.y*H, bx=nb.x*W, by=nb.y*H;
    ctx.save();
    ctx.strokeStyle=e.color+'88';
    ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
    ctx.setLineDash([]);
    // relation label
    var mx=(ax+bx)/2, my=(ay+by)/2;
    ctx.fillStyle='rgba(229,169,191,0.5)';
    ctx.font='10px Cormorant Garamond, serif';
    ctx.textAlign='center';
    ctx.fillText(e.relation, mx, my-6);
    ctx.restore();
  });

  // nodes
  nodes.forEach(function(n){
    var x=n.x*W, y=n.y*H;
    var isHover=(hoveredNode&&hoveredNode.id===n.id);
    var r=isHover?n.r+4:n.r;
    ctx.save();
    // glow
    if(isHover){
      ctx.shadowColor=n.color;
      ctx.shadowBlur=16;
    }
    // circle
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=n.color+'22';
    ctx.fill();
    ctx.strokeStyle=isHover?n.color:n.color+'88';
    ctx.lineWidth=isHover?2:1.5;
    ctx.stroke();
    ctx.shadowBlur=0;
    // name
    ctx.fillStyle=isHover?'#fdd6dd':'#c9a0b4';
    ctx.font=(isHover?'500 ':'')+'12px Noto Sans KR, sans-serif';
    ctx.textAlign='center';
    ctx.fillText(n.name, x, y+r+14);
    ctx.restore();
  });

  simulate();
  animFrame = requestAnimationFrame(draw);
}

function getNodeAt(mx,my){
  var W=canvas.width, H=canvas.height;
  return nodes.find(function(n){
    var dx=(n.x*W-mx), dy=(n.y*H-my);
    return Math.sqrt(dx*dx+dy*dy)<=n.r+8;
  })||null;
}

function getEdgeAt(mx,my){
  var W=canvas.width, H=canvas.height;
  var pairs=getPairs();
  var found=null;
  edges.forEach(function(e){
    var na=nodes.find(function(n){return n.id===e.a;}), nb=nodes.find(function(n){return n.id===e.b;});
    if(!na||!nb) return;
    var ax=na.x*W,ay=na.y*H,bx=nb.x*W,by=nb.y*H;
    var dx=bx-ax,dy=by-ay,len=Math.sqrt(dx*dx+dy*dy);
    var t=((mx-ax)*dx+(my-ay)*dy)/(len*len);
    t=Math.max(0,Math.min(1,t));
    var px=ax+t*dx,py=ay+t*dy;
    var dist=Math.sqrt((mx-px)*(mx-px)+(my-py)*(my-py));
    if(dist<12) found=pairs.find(function(p){return p.id===e.pairId;});
  });
  return found;
}

canvas.addEventListener('mousemove',function(ev){
  var rect=canvas.getBoundingClientRect();
  var mx=ev.clientX-rect.left, my=ev.clientY-rect.top;
  hoveredNode=getNodeAt(mx,my);
  canvas.style.cursor=hoveredNode||getEdgeAt(mx,my)?'pointer':'default';
});

canvas.addEventListener('click',function(ev){
  var rect=canvas.getBoundingClientRect();
  var mx=ev.clientX-rect.left, my=ev.clientY-rect.top;
  var node=getNodeAt(mx,my);
  if(node){
    var pairs=getPairs().filter(function(p){return p.chars.includes(node.id);});
    if(pairs.length) openPanel(pairs[0]);
    return;
  }
  var edge=getEdgeAt(mx,my);
  if(edge) openPanel(edge);
});

function openPanel(pair){
  document.getElementById('panel-names').innerHTML = pair.chars[0]+' <span>&</span> '+pair.chars[1];
  document.getElementById('panel-rel-tag').textContent = pair.relation||'—';
  document.getElementById('panel-desc').textContent = pair.desc||'—';
  document.getElementById('panel-story').textContent = pair.story||'—';
  var kw=document.getElementById('panel-keywords');
  kw.innerHTML=(pair.keywords||[]).map(function(k){return'<div class="panel-keyword">'+k+'</div>';}).join('');
  var imgs=document.getElementById('panel-imgs');
  imgs.innerHTML=pair.chars.map(function(name,i){
    var img=pair.charImgs&&pair.charImgs[i];
    return'<div class="panel-img-wrap">'+(img?'<img src="'+img+'" alt="'+name+'">':'<div class="panel-img-placeholder">'+name[0]+'</div>')+'<div class="panel-img-name">'+name+'</div></div>';
  }).join('');
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel(){
  document.getElementById('detail-panel').classList.remove('open');
}

window.addEventListener('resize',function(){ resizeCanvas(); });

// BGM
var bgmData=JSON.parse(localStorage.getItem('kisaragi_bgm')||'{"title":"BGM","artist":"","youtubeId":""}');
document.getElementById('bgm-title').textContent=bgmData.title||'BGM';
document.getElementById('bgm-artist').textContent=bgmData.artist||'';
window._bgmYtId=bgmData.youtubeId||'';
var ytPlayer=null,isPlaying=false;
document.getElementById('bgm-play-btn').addEventListener('click',function(){
  if(!window._bgmYtId)return;
  if(!ytPlayer){document.getElementById('yt-container').innerHTML='<div id="yt-iframe"></div>';var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);window.onYouTubeIframeAPIReady=function(){ytPlayer=new YT.Player('yt-iframe',{height:'1',width:'1',videoId:window._bgmYtId,playerVars:{autoplay:1,loop:1,playlist:window._bgmYtId},events:{onReady:function(e){e.target.setVolume(document.getElementById('bgm-vol').value);}}});};isPlaying=true;this.textContent='⏸';return;}
  if(isPlaying){ytPlayer.pauseVideo();isPlaying=false;this.textContent='▶';}else{ytPlayer.playVideo();isPlaying=true;this.textContent='⏸';}
});
document.getElementById('bgm-vol').addEventListener('input',function(){if(ytPlayer)ytPlayer.setVolume(this.value);});
document.getElementById('bgm-toggle-collapse').addEventListener('click',function(){document.getElementById('bgm-player').classList.add('collapsed');});
document.getElementById('bgm-expand-btn').addEventListener('click',function(){document.getElementById('bgm-player').classList.remove('collapsed');});

resizeCanvas();
buildGraph();
draw();
</script>
</body>
</html>
